<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" width="22" height="22">
  <defs>
    <!-- Mask to punch out the eyes and mouth from the solid head -->
    <mask id="face-mask">
      <!-- Everything white stays visible -->
      <rect x="0" y="0" width="22" height="22" fill="#ffffff" />
      
      <!-- Cutouts (Everything black is punched out and becomes transparent) -->
      <!-- Eyes (Vertical Ellipses) -->
      <ellipse cx="8.5" cy="13.8" rx="0.9" ry="1.4" fill="#000000" />
      <ellipse cx="13.5" cy="13.8" rx="0.9" ry="1.4" fill="#000000" />
      
      <!-- Smile (Curved Path) -->
      <path d="M 9.7,16.2 Q 11,17.2 12.3,16.2" fill="none" stroke="#000000" stroke-width="0.8" stroke-linecap="round" />
    </mask>
  </defs>

  <!-- The Menu Bar Icon (drawn in a single solid color) -->
  <!-- "currentColor" allows the SVG to automatically adapt to light/dark system menu bar themes -->
  <g fill="currentColor">
    <!-- Antenna (Git Branch Symbol) -->
    <!-- Left Branch & Stem -->
    <path d="M 11,10 L 11,7.8 Q 11,6.5 9.4,6.0" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Right Branch -->
    <path d="M 11,7.8 Q 12.3,7.8 13.0,6.6" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Antenna Nodes -->
    <circle cx="9.2" cy="5.0" r="1.1" />
    <circle cx="13.2" cy="5.4" r="1.1" />

    <!-- Robot Head (with the face mask applied for transparent eye/mouth punchouts) -->
    <rect x="5" y="10" width="12" height="9" rx="2.5" ry="2.5" mask="url(#face-mask)" />
  </g>
</svg>
