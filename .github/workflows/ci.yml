# Minimal verification gate — see docs/DECISIONS.md 2026-06-10 for why this
# was re-introduced after fd23bd1 removed it (repo is public → macOS runners
# are free; releases auto-update user machines → regressions propagate).
# Deliberately no Tauri bundle build: release builds stay local + signed
# (docs/RELEASING.md).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (svelte-check)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check Svelte
        run: npm run check

  backend:
    name: Backend (fmt + clippy + test)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      # actions-rust-lang/setup-rust-toolchain@v1 installs cargo into
      # ~/.cargo/bin but only prepends it to $GITHUB_PATH when rustup is
      # absent — and the macOS arm64 runners ship a rustup-init shim as
      # /usr/local/bin/cargo, so the prepend is skipped and the shim wins,
      # breaking `cargo fmt` with "unexpected argument 'fmt'". The
      # Force-cargo step below restores the expected ordering.
      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Force cargo from ~/.cargo/bin over rustup-init shim
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      # Vendored libgit2 + OpenSSL make the cold build take many minutes;
      # the cache keeps warm runs in single digits.
      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test --lib
